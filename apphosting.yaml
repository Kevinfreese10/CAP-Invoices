# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

# Settings for Cloud Run
runConfig:
  minInstances: 1
  maxInstances: 100
  concurrency: 80
  cpu: 1
  memoryMiB: 512

# Environment variables and secrets
env:
  - variable: STORAGE_BUCKET
    value: studio-2604127518-57889.firebasestorage.app
    availability:
      - BUILD
      - RUNTIME
  - variable: IMAP_HOST
    value: mail.myacc.co.za
  - variable: IMAP_PORT
    value: "993"
  - variable: SYSTEM_SMTP_HOST
    value: mail.myacc.co.za
  - variable: SYSTEM_SMTP_PORT
    value: "465"
  - variable: SYSTEM_SMTP_USER
    value: no_reply@myacc.co.za
  - variable: IMAP_USER
    value: invoices2@myacc.co.za
  - variable: GEMINI_API_KEY
    secret: gemini-api-key
  - variable: GOOGLE_GENAI_API_KEY
    secret: gemini-api-key
  - variable: IMAP_PASSWORD
    secret: imap-password
  - variable: SYSTEM_SMTP_PASS
    secret: system-smtp-pass
